services:
  - type: web
    name: dental-booking-agent
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_API_KEY
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: CLINIC_TIMEZONE
        value: Asia/Kolkata
      - key: APPOINTMENT_DURATION_MINUTES
        value: 30
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: FIRESTORE_PROJECT_ID
        sync: false
